;==================================================
; 全分组防 DNS 泄漏订阅转换模板（Smart 终极增强版）
; 适用环境：OpenClash Meta 内核 / 旁路由环境
; 优化重点：DNS 防泄漏、IPv6 屏蔽、虚拟网段直连
;==================================================

[custom]

;--------------------------------------------------
; 🚀 旁路由性能与链路优化
;--------------------------------------------------
; 建议在 OpenClash 设置中关闭 IPv6 以获得最佳防泄漏效果
ipv6: false
udp: true
tun-mtu: 1452
tun-device: utun
tun-stack: system
tun-gso: true
tun-auto-route: true
tun-auto-detect-interface: true

;--------------------------------------------------
; ✅ 1. 虚拟网络与内网段直连 (最优先)
;--------------------------------------------------
; 包含内网标准段及常见虚拟组网工具段 (Tailscale/ZeroTier/EasyTier)
ruleset=🎯 全球直连,[]IP-CIDR,127.0.0.0/8,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,10.0.0.0/8,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,172.16.0.0/12,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,192.168.0.0/16,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,100.64.0.0/10,no-resolve
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,tailscale.com
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,zerotier.com
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,zerotier.io
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,easytier.top
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,easytier.org

;--------------------------------------------------
; ✅ 2. 核心流媒体与 AI 分流 (防屏蔽/防泄漏)
;--------------------------------------------------
; Emby 独立分组：防止某些远程公益服直连打不开
ruleset=🎬 Emby分流,clash-classic:https://daili.sure156.cf/raw.githubusercontent.com/sure155/Custom_OpenClash_Rules/refs/heads/main/rule/emby-rules.yaml,86400
ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=🤖 Copilot,[]GEOSITE,bing
ruleset=🤖 AI服务,[]GEOSITE,category-ai-!cn
ruleset=🎶 TikTok,[]GEOSITE,tiktok
ruleset=📹 YouTube,[]GEOSITE,youtube
ruleset=🎻 Spotify,[]GEOSITE,spotify
ruleset=📢 谷歌FCM,[]GEOSITE,googlefcm
ruleset=🚀 GitHub,[]GEOSITE,github
ruleset=Ⓜ️ 微软服务,[]GEOSITE,microsoft
ruleset=🇬 谷歌服务,[]GEOSITE,google

;--------------------------------------------------
; ✅ 3. 代理规则
;--------------------------------------------------
; 强制走代理的分流 (自定义列表)
ruleset=🎥 代理域名,clash-classic:https://raw.githubusercontent.com/sure155/Custom_OpenClash_Rules/refs/heads/main/rule/proxy.yaml,28800
ruleset=🚀 手动选择,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical.yaml,28800
ruleset=🚀 手动选择,[]GEOSITE,gfw

;--------------------------------------------------
; ✅ 4. 直连规则 (国内流量/CDN/BT)
;--------------------------------------------------
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOSITE,google-cn
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Steam_CDN_Classical.yaml,28800
ruleset=🎯 全球直连,[]GEOSITE,category-public-tracker
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical.yaml,28800
ruleset=🎯 全球直连,clash-classic:https://static-file-global.353355.xyz/rules/cn-additional-list-clash.yaml,28800
ruleset=🎯 全球直连,[]GEOSITE,cn

; 关键：GEOIP 必须加 no-resolve 彻底杜绝 DNS 泄漏
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
ruleset=🇬 谷歌服务,[]GEOIP,google,no-resolve

;--------------------------------------------------
; ✅ 5. 特殊端口与兜底
;--------------------------------------------------
ruleset=🔀 非标端口,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml,28800
ruleset=🐟 漏网之鱼,[]FINAL

;==================================================
; 策略组配置 (Smart 旁路由增强)
;==================================================

; 核心手动控制
custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]🧠 智能优选(SMART)`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🌐 其他地区`.*

; Smart 智能组：增加 JP/SG 节点以适应 AI 需求，优化容差
custom_proxy_group=🧠 智能优选(SMART)`smart`(美|🇺🇸|洛杉矶|圣何塞|凤凰城|水牛城|DM|HK2|H|香港1|香港2|anytls|乌克兰|mo|s2|hello|墨西哥|美西|US)`http://www.gstatic.com/generate_204`240,300,50
; 延迟自动选择
custom_proxy_group=♻️ 自动选择`url-test`.*`https://cp.cloudflare.com/generate_204`300,,50

; 业务专用分组
custom_proxy_group=🎬 Emby分流`select`[]🎯 全球直连`[]🚀 手动选择`[]🧠 智能优选(SMART)`[]♻️ 自动选择`[]🇭🇰 香港节点
custom_proxy_group=🤖 ChatGPT`select`[]🧠 智能优选(SMART)`[]🇺🇸 美国节点`[]🚀 手动选择`[]🌐 其他地区
custom_proxy_group=🤖 AI服务`select`[]🧠 智能优选(SMART)`[]🚀 手动选择`[]🇺🇸 美国节点`[]🌐 其他地区
custom_proxy_group=🎥 代理域名`select`[]🇭🇰 香港节点`[]🚀 手动选择`[]🧠 智能优选(SMART)`[]♻️ 自动选择`[]🎯 全球直连
custom_proxy_group=📹 YouTube`select`[]🇭🇰 香港节点`[]🧠 智能优选(SMART)`[]🚀 手动选择`[]♻️ 自动选择`[]🇺🇸 美国节点
custom_proxy_group=🚀 GitHub`select`[]🇭🇰 香港节点`[]🧠 智能优选(SMART)`[]🚀 手动选择`[]🎯 全球直连
custom_proxy_group=🇬 谷歌服务`select`[]🇭🇰 香港节点`[]🧠 智能优选(SMART)`[]🎯 全球直连`[]🚀 手动选择
custom_proxy_group=Ⓜ️ 微软服务`select`[]🎯 全球直连`[]🇭🇰 香港节点`[]🚀 手动选择`[]🇺🇸 美国节点
custom_proxy_group=🚀 测速工具`select`[]🎯 全球直连`[]🚀 手动选择`[]🧠 智能优选(SMART)
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 手动选择`[]🧠 智能优选(SMART)`[]♻️ 自动选择`[]🎯 全球直连

; 地区分组正则增强
custom_proxy_group=🇭🇰 香港节点`url-test`(🇭🇰|港|HK|Hong Kong|Kowloon|深港)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国节点`url-test`(🇺🇸|美|US|United States|洛杉矶|圣何塞|凤凰城|西雅图|波特兰)`http://connectivitycheck.gstatic.com/generate_204`300,,50
custom_proxy_group=🌐 其他地区`url-test`(^(?!.*(港|HK|美|US|日本|JP|SG|新|新加坡)).*)`http://connectivitycheck.gstatic.com/generate_204`300,,50

custom_proxy_group=🎯 全球直连`select`[]DIRECT
custom_proxy_group=🔀 非标端口`select`[]🐟 遵循规则`[]🎯 全球直连
custom_proxy_group=🐟 遵循规则`select`[]🐟 漏网之鱼

;--------------------------------------------------
; 订阅生成控制
;--------------------------------------------------
enable_rule_generator=true
overwrite_original_rules=true
