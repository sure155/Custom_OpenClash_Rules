;==================================================
; 手机专用 Clash Meta / Mihomo 订阅转换模板
; 目标：省电、低延迟、少测速、适合 Android / iOS 客户端
; 适用：Clash Meta for Android / FlClash / Mihon / Stash / Shadowrocket 类客户端
;==================================================

[custom]

;--------------------------------------------------
; 手机端基础参数
;--------------------------------------------------
ipv6=false
udp=true
tun-mtu=1400
tun-device=utun
tun-stack=mixed
tun-gso=false
tun-auto-route=true
tun-auto-detect-interface=true

;--------------------------------------------------
; 局域网 / 私有地址直连
;--------------------------------------------------
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,100.64.0.0/10,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,127.0.0.0/8,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,172.16.0.0/12,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,192.168.0.0/16,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,10.0.0.0/8,no-resolve

;--------------------------------------------------
; 虚拟组网直连
;--------------------------------------------------
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,tailscale.com
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,zerotier.com
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,zerotier.io
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,easytier.top
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,easytier.org

;--------------------------------------------------
; AI / 流媒体 / 常用服务
;--------------------------------------------------
ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=🤖 Copilot,[]GEOSITE,bing
ruleset=🤖 AI服务,[]GEOSITE,category-ai-!cn

ruleset=📹 YouTube,[]GEOSITE,youtube
ruleset=🎶 TikTok,[]GEOSITE,tiktok
ruleset=🎻 Spotify,[]GEOSITE,spotify
ruleset=🚀 GitHub,[]GEOSITE,github

ruleset=📢 谷歌FCM,[]GEOSITE,googlefcm
ruleset=🇬 谷歌服务,[]GEOSITE,google
ruleset=🇬 谷歌服务,[]GEOIP,google,no-resolve
ruleset=Ⓜ️ 微软服务,[]GEOSITE,microsoft

;--------------------------------------------------
; 自定义直连 / 代理
;--------------------------------------------------
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical.yaml,28800
ruleset=🎯 全球直连,clash-domain:https://raw.githubusercontent.com/sure155/Custom_OpenClash_Rules/main/rule/Custom_Direct_Domain.mrs,86400
ruleset=🎯 全球直连,clash-ipcidr:https://raw.githubusercontent.com/sure155/Custom_OpenClash_Rules/main/rule/Custom_Direct_IP.mrs,86400

ruleset=🎥 代理域名,clash-domain:https://raw.githubusercontent.com/sure155/Custom_OpenClash_Rules/main/rule/Custom_Proxy_Domain.mrs,86400
ruleset=🚀 手动选择,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical.yaml,28800

;--------------------------------------------------
; 国内直连
;--------------------------------------------------
ruleset=🎯 全球直连,[]GEOSITE,google-cn
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Steam_CDN_Classical.yaml,28800
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve

;--------------------------------------------------
; 兜底
;--------------------------------------------------
ruleset=🐟 漏网之鱼,[]FINAL

;==================================================
; 手机端分组：轻量、省电、少测速
;==================================================

custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🌐 其他地区`.*

custom_proxy_group=♻️ 自动选择`url-test`.*`https://cp.cloudflare.com/generate_204`600,,80

custom_proxy_group=🎥 代理域名`select`[]🚀 手动选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🌐 其他地区
custom_proxy_group=🤖 ChatGPT`select`[]🇺🇸 美国节点`[]🚀 手动选择`[]♻️ 自动选择`[]🇯🇵 日本节点`[]🌐 其他地区
custom_proxy_group=🤖 Copilot`select`[]🚀 手动选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🎯 全球直连
custom_proxy_group=🤖 AI服务`select`[]🇺🇸 美国节点`[]🚀 手动选择`[]♻️ 自动选择`[]🇯🇵 日本节点`[]🌐 其他地区

custom_proxy_group=📢 谷歌FCM`select`[]🎯 全球直连`[]🇭🇰 香港节点`[]🚀 手动选择`[]♻️ 自动选择
custom_proxy_group=🚀 GitHub`select`[]🚀 手动选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🎯 全球直连
custom_proxy_group=📹 YouTube`select`[]🚀 手动选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点
custom_proxy_group=🎶 TikTok`select`[]🇺🇸 美国节点`[]🚀 手动选择`[]♻️ 自动选择`[]🇯🇵 日本节点
custom_proxy_group=🎻 Spotify`select`[]🚀 手动选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🎯 全球直连

custom_proxy_group=🇬 谷歌服务`select`[]🚀 手动选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点
custom_proxy_group=Ⓜ️ 微软服务`select`[]🎯 全球直连`[]🚀 手动选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 手动选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🌐 其他地区`[]🎯 全球直连

;--------------------------------------------------
; 地区分组：测速间隔调大，适合手机省电
;--------------------------------------------------
custom_proxy_group=🇭🇰 香港节点`url-test`(🇭🇰|港|HK|hk|Hong Kong|HongKong|hongkong|HKG)`https://cp.cloudflare.com/generate_204`600,,80
custom_proxy_group=🇺🇸 美国节点`url-test`(🇺🇸|美|US|United States|UnitedStates|洛杉矶|圣何塞|西雅图|硅谷|达拉斯|凤凰城)`https://cp.cloudflare.com/generate_204`600,,80
custom_proxy_group=🇯🇵 日本节点`url-test`(🇯🇵|日本|东京|大阪|JP|Japan|Tokyo|Osaka)`https://cp.cloudflare.com/generate_204`600,,80
custom_proxy_group=🌐 其他地区`url-test`(^(?!.*(港|HK|hk|Hong Kong|HKG|美|US|United States|日本|东京|大阪|JP|Japan)).*)`https://cp.cloudflare.com/generate_204`600,,80

custom_proxy_group=🎯 全球直连`select`[]DIRECT

;--------------------------------------------------
; 控制参数
;--------------------------------------------------
enable_rule_generator=true
overwrite_original_rules=true
